server:
  port: 8081

spring:
  application:
    name: event-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eventbooking}
    username: ${SPRING_DATASOURCE_USERNAME:eventbooking}
    password: ${SPRING_DATASOURCE_PASSWORD:eventbooking}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET:demo-shared-secret-key-for-event-booking-platform-32bytes-min}
  expiration-minutes: 60
